name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-ai-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sentinel-ai-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend Sanity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-ai-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sentinel-ai-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile backend modules
        run: python -m compileall app

      - name: App import smoke test
        run: python -c "from app.main import create_app; app = create_app(); print(app.title)"
