services:
  - type: web
    name: sentinel-ai-backend
    runtime: python
    rootDir: sentinel-ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "*"
      - key: COPILOT_PROVIDER
        value: mock

staticSites:
  - name: sentinel-ai-frontend
    rootDir: sentinel-ai-frontend
    buildCommand: npm ci && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_WS_BASE_URL
        sync: false
